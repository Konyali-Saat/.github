name: PR Agent (Reusable)

on:
  workflow_call:
    secrets:
      OPENROUTER_KEY:
        required: true

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    if: ${{ github.event.sender.type != 'Bot' }}
    steps:
      - name: Run PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENROUTER_KEY }}
          OPENAI.API_BASE: https://openrouter.ai/api/v1
          config.model: "openrouter/qwen/qwen3.6-plus"
          config.fallback_models: '["openrouter/deepseek/deepseek-v3.2", "openrouter/stepfun/step-3.5-flash"]'
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review"]'
          pr_reviewer.handle_push_trigger: "true"
