name: PR Agent Review

on:
  workflow_call:
    secrets:
      OPENROUTER_API_KEY:
        description: "OpenRouter API key for PR-Agent"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: PR Agent Review
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_BASE: "https://openrouter.ai/api/v1"
          OPENAI_MODEL: "anthropic/claude-sonnet-4-20250514"
          CONFIG.PR_DESCRIPTION: "true"
          CONFIG.PR_REVIEW: "true"
          CONFIG.PR_CODE_SUGGESTIONS: "true"
        with:
          args: "--pr_url ${{ github.event.pull_request.html_url }}"
